{% extends "biometrics/base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="card" style="max-width:360px;margin:60px auto;">
    <h2>Connexion</h2>
    {% if form.errors %}
        <p style="color:#ff8a8a;">Identifiants incorrects.</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="field">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" autofocus required>
        </div>
        <div class="field">
            <label>Mot de passe</label>
            <input type="password" name="password" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit">Se connecter</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:#9aa0c3;">
        Pas encore de compte ? <a href="{% url 'signup' %}" style="color:#4f6ef7;">Créer un compte</a>
    </p>
</div>
{% endblock %}
